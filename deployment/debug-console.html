<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCNT Vault - Debug Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: #4ec9b0;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            color: #858585;
            margin-bottom: 30px;
        }

        .section {
            background: #252526;
            border: 1px solid #3e3e42;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            color: #569cd6;
            font-size: 1.3rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .status-item {
            background: #2d2d30;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #858585;
        }

        .status-item.success {
            border-left-color: #4ec9b0;
        }

        .status-item.error {
            border-left-color: #f48771;
        }

        .status-item.warning {
            border-left-color: #dcdcaa;
        }

        .status-label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #d4d4d4;
        }

        .status-value {
            color: #858585;
            font-size: 0.9rem;
        }

        .status-icon {
            font-size: 1.2rem;
            margin-right: 8px;
        }

        .test-button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .test-button:hover {
            background: #1177bb;
        }

        .test-button:active {
            background: #0d5a8f;
        }

        .console-output {
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.85rem;
            margin-top: 15px;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #2d2d30;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-success { color: #4ec9b0; }
        .log-error { color: #f48771; }
        .log-warning { color: #dcdcaa; }
        .log-info { color: #569cd6; }

        .refresh-btn {
            background: #4ec9b0;
            color: #1e1e1e;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 20px;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #5fd9c0;
        }

        .stats-summary {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #2d2d30;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
            min-width: 150px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #858585;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 SCNT Vault Debug Console</h1>
        <p class="subtitle">Comprehensive system diagnostics and feature testing</p>

        <button class="refresh-btn" onclick="runAllTests()">🔄 Refresh All Tests</button>

        <div class="stats-summary" id="statsSummary"></div>

        <div class="section">
            <div class="section-title">📦 Core Data & Files</div>
            <div class="status-grid" id="coreData"></div>
        </div>

        <div class="section">
            <div class="section-title">🎯 Navigation & UI Elements</div>
            <div class="status-grid" id="navigationUI"></div>
        </div>

        <div class="section">
            <div class="section-title">🛒 Cart System</div>
            <div class="status-grid" id="cartSystem"></div>
        </div>

        <div class="section">
            <div class="section-title">💝 Wishlist System</div>
            <div class="status-grid" id="wishlistSystem"></div>
        </div>

        <div class="section">
            <div class="section-title">🔍 Search & Filter</div>
            <div class="status-grid" id="searchFilter"></div>
        </div>

        <div class="section">
            <div class="section-title">📱 Modals & Panels</div>
            <div class="status-grid" id="modalsPanel"></div>
        </div>

        <div class="section">
            <div class="section-title">⚙️ Functions & Features</div>
            <div class="status-grid" id="functions"></div>
        </div>

        <div class="section">
            <div class="section-title">📊 Console Output</div>
            <div class="console-output" id="consoleOutput"></div>
        </div>
    </div>

    <script src="perfumes-data.js"></script>
    <script src="script.js"></script>
    <script>
        let testResults = {
            passed: 0,
            failed: 0,
            warnings: 0
        };

        function log(message, type = 'info') {
            const output = document.getElementById('consoleOutput');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            output.appendChild(entry);
            output.scrollTop = output.scrollHeight;
        }

        function createStatusItem(label, status, value = '', testFn = null) {
            const statusClass = status === 'success' ? 'success' : status === 'error' ? 'error' : 'warning';
            const icon = status === 'success' ? '✅' : status === 'error' ? '❌' : '⚠️';
            
            if (status === 'success') testResults.passed++;
            else if (status === 'error') testResults.failed++;
            else testResults.warnings++;

            let testButton = '';
            if (testFn) {
                testButton = `<button class="test-button" onclick="${testFn}">Test</button>`;
            }

            return `
                <div class="status-item ${statusClass}">
                    <div class="status-label">
                        <span class="status-icon">${icon}</span>${label}
                    </div>
                    <div class="status-value">${value}</div>
                    ${testButton}
                </div>
            `;
        }

        function testElement(id, name) {
            const el = document.getElementById(id);
            if (el) {
                log(`✅ ${name} found`, 'success');
                return createStatusItem(name, 'success', `ID: ${id}`);
            } else {
                log(`❌ ${name} not found`, 'error');
                return createStatusItem(name, 'error', `Missing: ${id}`);
            }
        }

        function testFunction(fnName, displayName) {
            if (typeof window[fnName] === 'function') {
                log(`✅ ${displayName} function exists`, 'success');
                return createStatusItem(displayName, 'success', 'Function defined');
            } else {
                log(`❌ ${displayName} function missing`, 'error');
                return createStatusItem(displayName, 'error', 'Not defined');
            }
        }

        function testVariable(varName, displayName) {
            if (typeof window[varName] !== 'undefined') {
                const value = window[varName];
                const type = Array.isArray(value) ? `Array (${value.length} items)` : typeof value;
                log(`✅ ${displayName} exists: ${type}`, 'success');
                return createStatusItem(displayName, 'success', type);
            } else {
                log(`❌ ${displayName} not defined`, 'error');
                return createStatusItem(displayName, 'error', 'Undefined');
            }
        }

        function runAllTests() {
            testResults = { passed: 0, failed: 0, warnings: 0 };
            document.getElementById('consoleOutput').innerHTML = '';
            log('🚀 Starting comprehensive system diagnostics...', 'info');

            // Core Data & Files
            let html = '';
            html += testVariable('perfumesData', 'Perfumes Data');
            html += testVariable('cart', 'Shopping Cart');
            html += testVariable('wishlist', 'Wishlist');
            html += testVariable('filteredPerfumes', 'Filtered Perfumes');
            document.getElementById('coreData').innerHTML = html;

            // Navigation & UI
            html = '';
            html += testElement('navLinks', 'Navigation Links');
            html += testElement('mobileMenuToggle', 'Mobile Menu Toggle');
            html += testElement('navCartBtn', 'Nav Cart Button');
            html += testElement('navCartCount', 'Nav Cart Count');
            html += testElement('perfumeGrid', 'Perfume Grid');
            html += testElement('perfumeSearch', 'Search Input');
            document.getElementById('navigationUI').innerHTML = html;

            // Cart System
            html = '';
            html += testElement('cartPanel', 'Cart Panel');
            html += testElement('cartItems', 'Cart Items Container');
            html += testElement('cartSummary', 'Cart Summary');
            html += testElement('checkoutBtn', 'Checkout Button');
            html += testElement('cartSubtotal', 'Cart Subtotal');
            html += testElement('cartTotal', 'Cart Total');
            html += testFunction('addToCart', 'Add to Cart');
            html += testFunction('removeFromCart', 'Remove from Cart');
            html += testFunction('updateCartUI', 'Update Cart UI');
            html += testFunction('toggleCartPanel', 'Toggle Cart Panel');
            document.getElementById('cartSystem').innerHTML = html;

            // Wishlist System
            html = '';
            html += testElement('wishlistBtn', 'Wishlist Button');
            html += testElement('wishlistPanel', 'Wishlist Panel');
            html += testElement('wishlistItems', 'Wishlist Items');
            html += testElement('addToWishlist', 'Add to Wishlist Button');
            html += testFunction('addToWishlist', 'Add to Wishlist Function');
            html += testFunction('removeFromWishlist', 'Remove from Wishlist');
            document.getElementById('wishlistSystem').innerHTML = html;

            // Search & Filter
            html = '';
            html += testElement('categoryFilter', 'Category Filter');
            html += testElement('sortFilter', 'Sort Filter');
            html += testElement('clearFilters', 'Clear Filters Button');
            html += testElement('resultsCount', 'Results Count');
            html += testFunction('applyFilters', 'Apply Filters');
            html += testFunction('applySorting', 'Apply Sorting');
            document.getElementById('searchFilter').innerHTML = html;

            // Modals & Panels
            html = '';
            html += testElement('perfumeModal', 'Perfume Modal');
            html += testElement('checkoutModal', 'Checkout Modal');
            html += testElement('comparisonModal', 'Comparison Modal');
            html += testElement('addToCartModal', 'Add to Cart Button');
            html += testVariable('currentPerfumeInModal', 'Current Perfume in Modal');
            document.getElementById('modalsPanel').innerHTML = html;

            // Functions & Features
            html = '';
            html += testFunction('displayPerfumes', 'Display Perfumes');
            html += testFunction('openModal', 'Open Modal');
            html += testFunction('initializeCartButtons', 'Initialize Cart Buttons');
            html += testFunction('calculateCartTotals', 'Calculate Cart Totals');
            html += testFunction('showNotification', 'Show Notification');
            html += testFunction('openCheckout', 'Open Checkout');
            html += testFunction('toggleCompare', 'Toggle Compare');
            html += testFunction('compareItems', 'Compare Items');
            document.getElementById('functions').innerHTML = html;

            // Update stats
            updateStats();
            log('✨ Diagnostics complete!', 'success');
        }

        function updateStats() {
            const total = testResults.passed + testResults.failed + testResults.warnings;
            const passRate = total > 0 ? Math.round((testResults.passed / total) * 100) : 0;

            document.getElementById('statsSummary').innerHTML = `
                <div class="stat-box" style="border-left: 4px solid #4ec9b0;">
                    <div class="stat-number" style="color: #4ec9b0;">${testResults.passed}</div>
                    <div class="stat-label">Passed</div>
                </div>
                <div class="stat-box" style="border-left: 4px solid #f48771;">
                    <div class="stat-number" style="color: #f48771;">${testResults.failed}</div>
                    <div class="stat-label">Failed</div>
                </div>
                <div class="stat-box" style="border-left: 4px solid #dcdcaa;">
                    <div class="stat-number" style="color: #dcdcaa;">${testResults.warnings}</div>
                    <div class="stat-label">Warnings</div>
                </div>
                <div class="stat-box" style="border-left: 4px solid #569cd6;">
                    <div class="stat-number" style="color: #569cd6;">${passRate}%</div>
                    <div class="stat-label">Pass Rate</div>
                </div>
            `;
        }

        // Run tests on page load
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(runAllTests, 500);
        });
    </script>
</body>
</html>
