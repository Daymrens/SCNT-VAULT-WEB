<!DOCTYPE html>
<html>
<head>
    <title>Test Firestore Products</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .product { border: 1px solid #ddd; padding: 10px; margin: 10px 0; }
        .loading { color: blue; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Firestore Products Test</h1>
    <div id="status" class="loading">Loading...</div>
    <div id="products"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
        import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCTVEb364hJZveBr0iUu5a39TpgcBb63no",
            authDomain: "scnt-vault.firebaseapp.com",
            projectId: "scnt-vault",
            storageBucket: "scnt-vault.firebasestorage.app",
            messagingSenderId: "86926234856",
            appId: "1:86926234856:web:75d5119f0b4f54ff3fe55d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadProducts() {
            const statusDiv = document.getElementById('status');
            const productsDiv = document.getElementById('products');

            try {
                statusDiv.textContent = 'Connecting to Firestore...';
                
                const querySnapshot = await getDocs(collection(db, 'products'));
                
                statusDiv.className = 'success';
                statusDiv.textContent = `✅ Successfully loaded ${querySnapshot.size} products!`;

                if (querySnapshot.size === 0) {
                    productsDiv.innerHTML = '<p>No products found in database.</p>';
                } else {
                    querySnapshot.forEach((doc) => {
                        const product = doc.data();
                        const div = document.createElement('div');
                        div.className = 'product';
                        div.innerHTML = `
                            <strong>${product.Name || 'N/A'}</strong> - ${product.Brand || 'N/A'}<br>
                            Price: ₱${product.SellingPrice || product.Price || 0} | Stock: ${product.Stock || 0}<br>
                            Category: ${product.Category || 'N/A'} | Gender: ${product.Gender || 'N/A'}
                        `;
                        productsDiv.appendChild(div);
                    });
                }
            } catch (error) {
                statusDiv.className = 'error';
                statusDiv.textContent = `❌ Error: ${error.message}`;
                console.error('Error loading products:', error);
            }
        }

        loadProducts();
    </script>
</body>
</html>
