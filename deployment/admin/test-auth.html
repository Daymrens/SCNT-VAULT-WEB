<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Firebase Auth</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }
        .info { background: #dbeafe; color: #1e40af; }
        button {
            padding: 10px 20px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Firebase Auth Test</h1>
    
    <div id="status"></div>
    
    <h2>Test Login</h2>
    <input type="email" id="email" placeholder="Email" value="daymrens@gmail.com">
    <input type="password" id="password" placeholder="Password" value="admin123">
    <button onclick="testLogin()">Test Login</button>
    
    <h2>Current User</h2>
    <div id="userInfo">Not logged in</div>
    <button onclick="testLogout()">Logout</button>
    
    <h2>Console Logs</h2>
    <div id="logs" style="background: #f3f4f6; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px;"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            signOut, 
            onAuthStateChanged 
        } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCTVEb364hJZveBr0iUu5a39TpgcBb63no",
            authDomain: "scnt-vault.firebaseapp.com",
            projectId: "scnt-vault",
            storageBucket: "scnt-vault.firebasestorage.app",
            messagingSenderId: "86926234856",
            appId: "1:86926234856:web:75d5119f0b4f54ff3fe55d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            logsDiv.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            console.log(message);
        }

        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="${type}">${message}</div>`;
        }

        log('Firebase initialized');
        log('Auth domain: ' + firebaseConfig.authDomain);
        showStatus('Firebase initialized successfully', 'success');

        onAuthStateChanged(auth, (user) => {
            const userInfoDiv = document.getElementById('userInfo');
            if (user) {
                userInfoDiv.innerHTML = `
                    <strong>Logged in as:</strong><br>
                    Email: ${user.email}<br>
                    UID: ${user.uid}
                `;
                log('User logged in: ' + user.email);
                showStatus('User logged in: ' + user.email, 'success');
            } else {
                userInfoDiv.innerHTML = 'Not logged in';
                log('User logged out');
                showStatus('Not logged in', 'info');
            }
        });

        window.testLogin = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            log(`Attempting login with: ${email}`);
            showStatus('Attempting login...', 'info');
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                log('Login successful!');
                showStatus('Login successful!', 'success');
            } catch (error) {
                log(`Login error: ${error.code} - ${error.message}`);
                showStatus(`Login error: ${error.message}`, 'error');
            }
        };

        window.testLogout = async function() {
            try {
                await signOut(auth);
                log('Logout successful');
                showStatus('Logged out', 'info');
            } catch (error) {
                log(`Logout error: ${error.message}`);
                showStatus(`Logout error: ${error.message}`, 'error');
            }
        };
    </script>
</body>
</html>
